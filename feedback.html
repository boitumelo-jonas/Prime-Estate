<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prime Estates - Feedback</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css"> 
</head>
<body>
  
  <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="images/logo.jpeg" alt="Prime Estates Logo" style="height:50px;" class="me-2">
        <span class="fw-bold">Your Trusted Real Estate Partner</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
          <li class="nav-item"><a href="about.html" class="nav-link">About Us</a></li>
          <li class="nav-item"><a href="properties.html" class="nav-link">Properties</a></li>
          <li class="nav-item"><a href="contact.html" class="nav-link">Contact Us</a></li>
          <li class="nav-item"><a href="feedback.html" class="nav-link active">Feedback</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <section class="feedback">
      <h1 class="mb-3">We Value Your Feedback</h1>
      <p class="mb-4">Your thoughts help us improve our services and provide the best property experience.</p>

      <!-- Feedback Form -->
      <form id="feedbackForm" class="p-4 border rounded shadow-sm bg-white">
        <div class="mb-3">
          <label for="name" class="form-label">Full Name</label>
          <input type="text" id="name" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="rating" class="form-label">Rate Our Service</label>
          <select id="rating" name="rating" class="form-select" required>
            <option value="">-- Select Rating --</option>
            <option value="5">Excellent ★★★★★</option>
            <option value="4">Very Good ★★★★</option>
            <option value="3">Good ★★★</option>
            <option value="2">Fair ★★</option>
            <option value="1">Poor ★</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="comments" class="form-label">Comments</label>
          <textarea id="comments" name="comments" rows="5" class="form-control" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100">Submit Feedback</button>
      </form>
    </section>
  </main>

  <footer class="bg-dark text-white text-center py-3 mt-4">
    <p class="mb-0">© 2026 Prime Estates | Contact: info@primeestates.com</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
